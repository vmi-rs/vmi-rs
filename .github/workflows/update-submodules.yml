name: Update submodules

on:
  repository_dispatch:
    types: [isr-updated, vmi-updated]
  workflow_dispatch:
    inputs:
      submodule:
        description: Submodule to update
        required: true
        type: choice
        options:
          - isr
          - vmi

permissions:
  contents: write

jobs:
  update:
    name: Update submodule
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Determine submodule
        id: submodule
        run: |
          if [ -n "${{ github.event.inputs.submodule }}" ]; then
            name="${{ github.event.inputs.submodule }}"
          else
            name="${{ github.event.action }}"
            name="${name%-updated}"
          fi
          echo "name=$name" >> "$GITHUB_OUTPUT"

      - name: Update submodule
        run: |
          cd "${{ steps.submodule.outputs.name }}"
          git fetch origin master
          git checkout ${{ github.event.client_payload.sha || 'origin/master' }}

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "${{ steps.submodule.outputs.name }}"
          git commit -m "chore: update ${{ steps.submodule.outputs.name }} submodule"
          git push
